name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test --workspace=apps/web
      - run: npm run build

  workers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/workers[dev]"
      - run: ruff check apps/workers
      - run: mypy apps/workers/src
      - run: pytest apps/workers/tests

  database:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: job_globe
          POSTGRES_PASSWORD: job_globe
          POSTGRES_DB: job_globe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U job_globe -d job_globe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://job_globe:job_globe@localhost:5432/job_globe
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python packages/database/scripts/validate_migrations.py packages/database/migrations
      - run: python packages/database/scripts/apply_migrations.py packages/database/migrations
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f packages/database/seeds/taxonomy_reference.sql -f packages/database/seeds/demo_jobs.sql
      - run: |
          psql "$DATABASE_URL" -tAc "
            select count(*)
            from information_schema.tables
            where table_schema = 'public'
              and table_name <> 'schema_migrations';
          " | grep 17
      - run: psql "$DATABASE_URL" -tAc "select count(*) from schema_migrations;" | grep 13
