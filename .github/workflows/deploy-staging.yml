name: Deploy Staging

on:
  push:
    branches: [main]

# Only one deployment at a time — cancel in-progress if a new push arrives.
concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  # ── Web: build and deploy to Vercel (staging) ───────────────────────────────
  deploy-web:
    name: Deploy web → Vercel staging
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test --workspace=apps/web

      - name: Pull Vercel environment and project metadata
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt output to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "preview-url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Workers: deploy Docker image to Railway ──────────────────────────────────
  deploy-workers:
    name: Deploy workers → Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy workers service to Railway
        run: railway up --service workers --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Post-deploy: smoke test the staging URL ──────────────────────────────────
  smoke-test:
    name: Smoke test staging health endpoint
    runs-on: ubuntu-latest
    needs: deploy-web
    if: needs.deploy-web.outputs.preview-url != ''

    steps:
      - name: Wait for deployment to become reachable
        run: sleep 20

      - name: GET /api/health — expect status ok
        run: |
          PREVIEW_URL="${{ needs.deploy-web.outputs.preview-url }}"
          STATUS=$(curl -sf --max-time 30 "$PREVIEW_URL/api/health" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('status','unknown'))")
          echo "Health status: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "::warning::Health check returned '$STATUS' — check $PREVIEW_URL/api/health"
          fi
